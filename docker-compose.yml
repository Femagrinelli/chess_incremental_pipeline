x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    AIRFLOW__LOGGING__LOG_LEVEL: INFO
    PYTHONPATH: /opt/airflow/scripts
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_REGION: ${AWS_REGION}
    S3_BUCKET: ${S3_BUCKET}
    S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
    RAW_PREFIX: ${RAW_PREFIX}
    STATE_PREFIX: ${STATE_PREFIX}
    CHESS_API_USER_AGENT: ${CHESS_API_USER_AGENT}
    CHESS_API_DELAY: ${CHESS_API_DELAY}
    ARCHIVE_REFRESH_DAYS: ${ARCHIVE_REFRESH_DAYS}
    ACTIVE_ARCHIVE_REFRESH_HOURS: ${ACTIVE_ARCHIVE_REFRESH_HOURS}
    TITLE_TASK_MAX_WORKERS: ${TITLE_TASK_MAX_WORKERS}
    BACKFILL_PLAYERS_PER_RUN: ${BACKFILL_PLAYERS_PER_RUN}
    BACKFILL_MONTHS_PER_PLAYER: ${BACKFILL_MONTHS_PER_PLAYER}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:15-alpine
    container_name: chess_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    container_name: chess_airflow_webserver
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$$AIRFLOW_ADMIN_USER" \
          --password "$$AIRFLOW_ADMIN_PASSWORD" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$$AIRFLOW_ADMIN_EMAIL" 2>/dev/null || true &&
        exec airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    <<: *airflow-common
    container_name: chess_airflow_scheduler
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        exec airflow scheduler

volumes:
  postgres_data:
