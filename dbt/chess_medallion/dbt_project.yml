name: chess_medallion
version: 1.0.0
config-version: 2

profile: chess_medallion

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
test-paths: ["tests"]

target-path: target
clean-targets:
  - target
  - dbt_packages
  - logs

on-run-start:
  - "{{ register_upstream_external_models() }}"

vars:
  month_key: null
  month_keys: []
  snapshot_date: null

models:
  chess_medallion:
    staging:
      +materialized: ephemeral
      +schema: staging
      +tags: ["staging"]
    silver:
      +materialized: external
      +format: parquet
      +schema: silver
      +tags: ["silver"]
    gold:
      +materialized: external
      +format: parquet
      +schema: gold
      +tags: ["gold"]
