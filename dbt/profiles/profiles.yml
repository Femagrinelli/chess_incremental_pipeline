chess_medallion:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', '/opt/airflow/duckdb/chess_pipeline.duckdb') }}"
      schema: analytics
      threads: "{{ env_var('DBT_DUCKDB_THREADS', '4') | int }}"
      extensions:
        - httpfs
        - parquet
      settings:
        s3_region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
        s3_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
        s3_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"
        s3_session_token: "{{ env_var('AWS_SESSION_TOKEN', '') }}"
      external_root: "s3://{{ env_var('S3_BUCKET') }}"
