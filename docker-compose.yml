x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  user: "${AIRFLOW_UID:-50000}:0"
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres/airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE: ${AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE:-3}
    AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW: ${AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW:-2}
    AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: ${AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE:-1800}
    AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: ${AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING:-true}
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${SECRET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: UTC
    AIRFLOW__CORE__PARALLELISM: ${AIRFLOW__CORE__PARALLELISM:-2}
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: ${AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG:-2}
    AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: ${AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT:-120}
    AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT: ${AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT:-300}
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: ${AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL:-60}
    AIRFLOW__SCHEDULER__PARSING_PROCESSES: ${AIRFLOW__SCHEDULER__PARSING_PROCESSES:-1}
    AIRFLOW__SCHEDULER__STALE_DAG_THRESHOLD: ${AIRFLOW__SCHEDULER__STALE_DAG_THRESHOLD:-300}
    AIRFLOW__LOGGING__LOG_LEVEL: INFO
    AIRFLOW__WEBSERVER__WORKERS: ${AIRFLOW__WEBSERVER__WORKERS:-1}
    PYTHONPATH: /opt/airflow/scripts
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    AWS_REGION: ${AWS_REGION}
    S3_BUCKET: ${S3_BUCKET}
    S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
    RAW_PREFIX: ${RAW_PREFIX}
    BRONZE_PREFIX: ${BRONZE_PREFIX:-bronze/chess_com}
    STATE_PREFIX: ${STATE_PREFIX}
    SILVER_PREFIX: ${SILVER_PREFIX:-silver/chess_com}
    GOLD_PREFIX: ${GOLD_PREFIX:-gold/chess_com}
    PARQUET_BUCKET_COUNT: ${PARQUET_BUCKET_COUNT:-16}
    CHESS_API_USER_AGENT: ${CHESS_API_USER_AGENT}
    CHESS_API_DELAY: ${CHESS_API_DELAY}
    ARCHIVE_REFRESH_DAYS: ${ARCHIVE_REFRESH_DAYS}
    ACTIVE_ARCHIVE_REFRESH_HOURS: ${ACTIVE_ARCHIVE_REFRESH_HOURS}
    TITLE_TASK_MAX_WORKERS: ${TITLE_TASK_MAX_WORKERS}
    BACKFILL_PLAYERS_PER_RUN: ${BACKFILL_PLAYERS_PER_RUN}
    BACKFILL_MONTHS_PER_PLAYER: ${BACKFILL_MONTHS_PER_PLAYER}
    DBT_PROFILES_DIR: /opt/airflow/dbt/profiles
    DBT_ATHENA_CATALOG: ${DBT_ATHENA_CATALOG:-awsdatacatalog}
    DBT_ATHENA_SOURCE_SCHEMA: ${DBT_ATHENA_SOURCE_SCHEMA:-chess_bronze_external}
    DBT_ATHENA_BRONZE_SCHEMA: ${DBT_ATHENA_BRONZE_SCHEMA:-chess_bronze}
    DBT_ATHENA_SILVER_SCHEMA: ${DBT_ATHENA_SILVER_SCHEMA:-chess_silver}
    DBT_ATHENA_GOLD_SCHEMA: ${DBT_ATHENA_GOLD_SCHEMA:-chess_gold}
    DBT_ATHENA_S3_STAGING_DIR: ${DBT_ATHENA_S3_STAGING_DIR}
    DBT_ATHENA_WORKGROUP: ${DBT_ATHENA_WORKGROUP:-primary}
    DBT_ATHENA_THREADS: ${DBT_ATHENA_THREADS:-4}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - ./dbt:/opt/airflow/dbt
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:
  postgres:
    image: postgres:15-alpine
    container_name: chess_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  airflow-webserver:
    <<: *airflow-common
    container_name: chess_airflow_webserver
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$$AIRFLOW_ADMIN_USER" \
          --password "$$AIRFLOW_ADMIN_PASSWORD" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$$AIRFLOW_ADMIN_EMAIL" 2>/dev/null || true &&
        exec airflow webserver
    ports:
      # Expose only on the VPS loopback interface; access via SSH port forwarding.
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    <<: *airflow-common
    container_name: chess_airflow_scheduler
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        exec airflow scheduler

volumes:
  postgres_data:
